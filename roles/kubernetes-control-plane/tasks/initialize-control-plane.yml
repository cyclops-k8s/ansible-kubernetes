- name: Initialize the Kubernetes cluster
  block:

  - name: Stop kubelet
    when:
    - not kubernetes_already_installed
    ansible.builtin.systemd:
      enabled: true
      name: kubelet
      state: stopped

  - name: Initialize Kubernetes Cluster
    when:
    - inventory_hostname == first_kube_control_plane
    - not kubernetes_already_installed
    vars:
      kubeadm_init_command: >-
        kubeadm init
          --config={{ kubernetes_config_directory }}/kubeadm.yaml
          {% if _ignore_errors | length > 0 %}--ignore-preflight-errors={{ _ignore_errors | flatten | join(',') }}{% endif %}
          --upload-certs
          -v5
          {{ kubernetes_kubeadm_init_extra_args }}
      _ignore_errors: []
    block:

    - name: Initialize Kubernetes Cluster - first attempt
      changed_when: kubeadm_init.rc == 0
      failed_when: kubeadm_init.rc != 0
      register: kubeadm_init
      ansible.builtin.command:
        cmd: "{{ kubeadm_init_command }}"

    rescue:

    # Retry is because different areas of the kubeadm init sometimes fails, especially on centos 9
    - name: Initialize Kubernetes Cluster - retry
      changed_when: kubeadm_init_retry.rc == 0
      failed_when: kubeadm_init_retry.rc != 0
      register: kubeadm_init_retry
      retries: 2
      until: kubeadm_init_retry is succeeded
      vars:
        # we can safely ignore these preflight errors on retry of an init
        _ignore_errors:
        - DirAvailable--var-lib-etcd
        - FileAvailable--etc-kubernetes-manifests-etcd.yaml
        - FileAvailable--etc-kubernetes-manifests-kube-controller-manager.yaml
        - FileAvailable--etc-kubernetes-manifests-kube-scheduler.yaml
        - FileAvailable--etc-kubernetes-manifests-kube-apiserver.yaml
        # TODO: make all of these different ports configurable, they're health checks and metrics ports mostly
        - Port-10250
        - Port-{{ kubernetes_api_server_port }}
        - Port-10257
        - Port-10259
        - Port-2379
        - Port-2380
      ansible.builtin.command:
        cmd: "{{ kubeadm_init_command }}"

  - name: Start kubelet
    when:
    - not kubernetes_already_installed
    ansible.builtin.service:
      enabled: true
      name: kubelet
      state: started

  - name: Wait for Kubernetes to fully finalize
    changed_when: false
    delay: 2
    environment:
      KUBECONFIG: /etc/kubernetes/admin.conf
    register: kubernetes_sa_default_exists
    retries: 60
    until: kubernetes_sa_default_exists.rc == 0
    when:
    - not kubernetes_already_installed
    ansible.builtin.command:
      cmd: kubectl get serviceaccount --namespace=default default

  - name: Approve CSRs
    ansible.builtin.include_tasks:
      file: approve-csr.yaml

  - name: Post cluster init hooks
    loop: "{{ kubernetes_hookfiles.post_cluster_init }}"
    loop_control:
      loop_var: hook
    when:
    - kubernetes_hookfiles.post_cluster_init is defined
    - not kubernetes_already_installed
    ansible.builtin.include_tasks:
      file: "{{ hook }}"

  - name: Set admin.conf namespace to kube-system
    changed_when: false
    environment:
      KUBECONFIG: /etc/kubernetes/admin.conf
    register: admin_namespace_set
    when:
    - not kubernetes_already_installed
    ansible.builtin.command:
      cmd: kubectl config set-context --current --namespace=kube-system

  # TODO: is this needed in later versions of kubernetes?
  - name: Create cluster role binding to make the kube-scheduler fully happy
    changed_when: kube_scheduler_rolebinding.rc == 0
    environment:
      KUBECONFIG: /etc/kubernetes/admin.conf
    register: kube_scheduler_rolebinding
    when:
    - not kubernetes_already_installed
    ansible.builtin.command:
      cmd: >-
        kubectl create rolebinding
        --namespace kube-system
        --role=extension-apiserver-authentication-reader
        --user system:kube-scheduler
        fix:kube-scheduler:extension-apiserver-authentication-reader

  - name: Create the /root/.kube directory
    when:
    - not kubernetes_already_installed
    ansible.builtin.file:
      group: root
      mode: '0600'
      owner: root
      path: /root/.kube
      state: directory

  - name: Link admin.conf to /root/.kube/config
    when:
    - not kubernetes_already_installed
    ansible.builtin.file:
      dest: /root/.kube/config
      src: /etc/kubernetes/admin.conf
      state: link

  # CIS 1.1.20, STIG V-242466
  - name: CIS 1.1.20, STIG V-242466 - Find crt files in the PKI directory
    register: kubernetes_pki_crt_files
    ansible.builtin.find:
      paths:
      - "{{ kubernetes_pki_directory }}"
      patterns:
      - "*.crt"

  # CIS 1.1.20, STIG V-242466
  - name: CIS 1.1.20, STIG V-242466 - Fix permissions on certificates
    loop: "{{ kubernetes_pki_crt_files.files }}"
    loop_control:
      label: "{{ file.path }}"
      loop_var: file
    ansible.builtin.file:
      mode: '0600'
      path: "{{ file.path }}"

  # CIS 1.2.5
  - name: CIS 1.2.5 - Copy crb-kubeletcerts.yml
    when:
    - not kubernetes_already_installed
    ansible.builtin.copy:
      dest: "{{ kubernetes_config_directory }}/crb-kubeletcerts.yml"
      group: root
      mode: '0600'
      owner: root
      src: crb-kubeletcerts.yml

  - name: CIS 1.2.5 - Create cluster role bindings for kubelet certs
    changed_when: true
    environment:
      KUBECONFIG: /etc/kubernetes/admin.conf
    register: crb_kubeletcerts
    when:
    - not kubernetes_already_installed
    ansible.builtin.shell:
      cmd: |
        set -eo pipefail
        kubectl get clusterrolebinding create-csrs-for-bootstrapping && exit 0 || true
        kubectl apply -f {{ kubernetes_config_directory }}/crb-kubeletcerts.yml
      executable: /bin/bash

  # CIS 4.1.1
  - name: CIS 4.1.1 - Set kubelet.service to 0600
    when:
    - not kubernetes_already_installed
    ansible.builtin.file:
      mode: '0600'
      path: /usr/lib/systemd/system/kubelet.service

  # CIS 4.1.9
  # STIG V-242407
  - name: CIS 4.1.9, STIG V-242407 - Set kubelet config.yaml to 0600
    when:
    - not kubernetes_already_installed
    ansible.builtin.file:
      mode: '0600'
      path: /var/lib/kubelet/config.yaml

  # CIS 5.1.5
  - name: Create service account patch file
    when:
    - not kubernetes_already_installed
    ansible.builtin.copy:
      content: |
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: default
        automountServiceAccountToken: false
      dest: /etc/kubernetes/config/default-serviceaccount-patch.yaml
      group: root
      mode: '0600'
      owner: root

  - name: Get all namespaces
    changed_when: false
    environment:
      KUBECONFIG: /etc/kubernetes/admin.conf
    register: all_namespaces
    when:
    - not kubernetes_already_installed
    ansible.builtin.command:
      cmd: kubectl get namespaces -o jsonpath='{.items[*].metadata.name}'

  - name: Apply service account patch
    changed_when: serviceaccount_patch.stdout is search('patched')
    environment:
      KUBECONFIG: /etc/kubernetes/admin.conf
    loop: "{{ all_namespaces.stdout.split() }}"
    loop_control:
      loop_var: namespace
    register: serviceaccount_patch
    when:
    - not kubernetes_already_installed
    ansible.builtin.command:
      cmd: >-
        kubectl patch serviceaccount default
        --namespace={{ namespace }}
        --patch-file /etc/kubernetes/config/default-serviceaccount-patch.yaml

  - name: Post security hooks
    loop: "{{ kubernetes_hookfiles.post_security }}"
    loop_control:
      loop_var: hook
    when:
    - kubernetes_hookfiles.post_security is defined
    ansible.builtin.include_tasks:
      file: "{{ hook }}"

  rescue:

  - name: Write kubeadm init output to stdout
    when: kubeadm_init is defined
    ansible.builtin.debug:
      msg: "{{ kubeadm_init }}"

  - name: Write kubeadm init retry output to stdout
    when: kubeadm_init_retry is defined
    ansible.builtin.debug:
      msg: "{{ kubeadm_init_retry }}"

  - name: Write admin_namespace_set init output to stdout
    when: admin_namespace_set is defined
    ansible.builtin.debug:
      msg: "{{ admin_namespace_set }}"

  - name: Write kube_scheduler_rolebinding init output to stdout
    when: kube_scheduler_rolebinding is defined
    ansible.builtin.debug:
      msg: "{{ kube_scheduler_rolebinding }}"

  - name: Write copy_admin_conf init output to stdout
    when: copy_admin_conf is defined
    ansible.builtin.debug:
      msg: "{{ copy_admin_conf }}"

  - name: Write crb_kubeletcerts init output to stdout
    when: crb_kubeletcerts is defined
    ansible.builtin.debug:
      msg: "{{ crb_kubeletcerts }}"

  - name: Output serviceaccount_patch error
    when: serviceaccount_patch is defined
    ansible.builtin.debug:
      msg: "{{ serviceaccount_patch }}"

  - name: Fail kubeadm init
    ansible.builtin.fail:
      msg: "Failed to initialize the Kubernetes cluster"
