- name: Update kubelet, kubectl and containerd.io (Debian/Ubuntu)
  when: ansible_facts.os_family == "Debian"
  block:
  - name: Update kubelet and kubectl to specified k8s_version
    with_items:
    - kubelet={{ k8s_version }}
    - kubectl={{ k8s_version }}
    ansible.builtin.apt:
      allow_change_held_packages: true
      name: "{{ item }}"
      state: present

  - name: Resolve containerd package version (Debian/Ubuntu)
    ansible.builtin.include_role:
      name: container-runtime
      tasks_from: containerd-resolve-version-debian.yaml

  - name: Upgrade containerd
    ansible.builtin.apt:
      allow_change_held_packages: true
      allow_downgrade: true
      name: "{{ 'containerd.io' if containerd_version == 'latest' else 'containerd.io=' + containerd_version }}"
      only_upgrade: "{{ containerd_version == 'latest' }}"
      state: "{{ 'present' if containerd_version != 'latest' else 'latest' }}"

  # TODO: support crio
  - name: Reconfigure containerd for new version
    ansible.builtin.include_role:
      name: container-runtime
      tasks_from: containerd-configure.yaml

  - name: Hold kubelet, kubectl and containerd.io
    with_items:
    - kubelet
    - kubectl
    - containerd.io
    ansible.builtin.dpkg_selections:
      name: "{{ item }}"
      selection: hold

- name: Update kubelet, kubectl and containerd.io (RedHat/Rocky/Alma/Fedora)
  when: ansible_facts.os_family == "RedHat"
  block:
  - name: Remove version locks
    changed_when: true
    with_items:
    - kubelet
    - kubectl
    - containerd.io
    ansible.builtin.command:
      cmd: dnf versionlock delete {{ item }}

  - name: Update kubelet and kubectl to specified k8s_version
    with_items:
    - kubelet-{{ k8s_version }}
    - kubectl-{{ k8s_version }}
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: present

  - name: Resolve containerd package version (RedHat)
    ansible.builtin.include_role:
      name: container-runtime
      tasks_from: containerd-resolve-version-redhat.yaml

  - name: Upgrade containerd
    ansible.builtin.dnf:
      allow_downgrade: true
      name: "{{ 'containerd.io' if containerd_version == 'latest' else 'containerd.io-' + containerd_version }}"
      state: "{{ 'latest' if containerd_version == 'latest' else 'present' }}"

  # TODO: support crio
  - name: Reconfigure containerd for new version
    ansible.builtin.include_role:
      name: container-runtime
      tasks_from: containerd-configure.yaml

  - name: Hold kubelet, kubectl and containerd.io
    changed_when: true
    with_items:
    - kubelet
    - kubectl
    - containerd.io
    ansible.builtin.command:
      cmd: dnf versionlock add {{ item }}

- name: Reload kubelet
  ansible.builtin.systemd_service:
    daemon_reload: true
    enabled: true
    name: kubelet
    state: restarted
