# Workaround for etcd 3.6 membership store inconsistency (etcd-io/etcd#20967):
# v2store and v3store membership data can become inconsistent. In etcd 3.5.x, v2store is
# the source of truth so this is invisible. In etcd 3.6.x, v3store becomes the source of
# truth, causing stale/duplicate member entries to surface during WAL replay. This can
# reset the raft voter configuration and break quorum. Fixed in etcd 3.5.26 + 3.6.7, but
# K8s releases may bundle affected versions. Forcing a raft snapshot before upgrade ensures
# stale ConfChange entries are truncated from the WAL, preventing the issue regardless of
# etcd version. This is a safe no-op on unaffected versions.
# See: https://github.com/etcd-io/etcd/issues/20967
- name: Read etcd static pod manifest
  register: etcd_manifest_raw
  ansible.builtin.slurp:
    src: "/etc/kubernetes/manifests/etcd.yaml"

- name: Determine etcd snapshot-count from manifest
  vars:
    etcd_manifest: "{{ etcd_manifest_raw.content | b64decode | from_yaml }}"
    etcd_command: "{{ etcd_manifest.spec.containers[0].command }}"
    snapshot_args: "{{ etcd_command | select('match', '^--snapshot-count=') | list }}"
  ansible.builtin.set_fact:
    etcd_snapshot_count: "{{ (snapshot_args | first | split('='))[1] if snapshot_args | length > 0 else '10000' }}"

- name: Find running etcd container
  changed_when: false
  failed_when: etcd_container_result.stdout_lines | length == 0
  register: etcd_container_result
  ansible.builtin.command:
    cmd: crictl ps --name etcd -q

- name: Set etcd connection facts
  ansible.builtin.set_fact:
    etcd_container: "{{ etcd_container_result.stdout_lines[0] }}"
    etcd_ctl: >-
      crictl exec {{ etcd_container_result.stdout_lines[0] }} etcdctl
      --endpoints=https://127.0.0.1:2379
      --cacert=/etc/kubernetes/pki/etcd/ca.crt
      --cert=/etc/kubernetes/pki/etcd/server.crt
      --key=/etc/kubernetes/pki/etcd/server.key

# CONFIRMED BUG (2026-07-19, live cluster): this task holds a single continuous SSH exec
# channel open for the entire duration of the write loop (45-90+ minutes observed, since
# snapshot-count=10000 means 10,001 separate `crictl exec` round trips even backgrounded 20 at a
# time - the etcd container has no shell/`sh` binary at all, so batching the loop into one exec
# via a wrapper script is not possible; each put must be its own crictl exec). Twice this caused
# the single held-open SSH connection to go silently dead mid-task with no incremental output to
# detect it (the remote script had likely already finished, but the control node never received
# the completion signal and eventually reported "Shared connection to <host> closed" after
# sitting stuck for well over an hour) - confirmed NOT a disk I/O problem (moving etcd's data
# directory to tmpfs made no measurable difference).
#
# FIX: run the write loop via async/poll instead of a single synchronous, continuously-connected
# task. `poll: 0` returns almost immediately after launching the script detached on the remote
# host; a separate async_status polling task then checks completion via short, independent SSH
# connections every 15s - if any single poll's connection drops, the NEXT poll just opens a new
# one, rather than the entire task failing because one long-held channel died.
- name: Write entries to force etcd raft snapshot
  async: 7200
  poll: 0
  changed_when: true
  register: etcd_snapshot_write_job
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      WRITE_COUNT=$(( {{ etcd_snapshot_count }} + 1 ))
      echo "Writing ${WRITE_COUNT} entries to force raft snapshot (snapshot-count={{ etcd_snapshot_count }})..."
      for i in $(seq 1 "${WRITE_COUNT}"); do
        {{ etcd_ctl }} put "/pre-upgrade-snapshot/${i}" x >/dev/null 2>&1 &
        if (( i % 20 == 0 ))
        then
          wait
        fi
      done
      wait
    executable: /bin/bash

- name: Wait for the write job to complete
  async_status:
    jid: "{{ etcd_snapshot_write_job.ansible_job_id }}"
  register: etcd_snapshot_write_job_result
  until: etcd_snapshot_write_job_result.finished
  retries: 480
  delay: 15

- name: Wait for raft snapshot to be written to disk
  ansible.builtin.pause:
    seconds: 5

- name: Clean up snapshot trigger keys
  changed_when: true
  ansible.builtin.command:
    cmd: "{{ etcd_ctl }} del /pre-upgrade-snapshot/ --prefix"

- name: Get current etcd revision
  changed_when: false
  register: etcd_status_result
  ansible.builtin.command:
    cmd: "{{ etcd_ctl }} endpoint status -w json"

- name: Set etcd revision fact
  ansible.builtin.set_fact:
    etcd_revision: "{{ (etcd_status_result.stdout | from_json)[0].Status.header.revision }}"

- name: Compact etcd to current revision
  changed_when: true
  failed_when: false
  ansible.builtin.command:
    cmd: "{{ etcd_ctl }} compact {{ etcd_revision }}"

- name: Defragment etcd storage
  changed_when: true
  failed_when: false
  ansible.builtin.command:
    cmd: "{{ etcd_ctl }} defrag"
