name: Conformance Tests

on:
  workflow_dispatch:

env:
  IS_CI: "true"
  KUBERNETES_VERSION: 1.36
  WORKING_DIR: ci-cd/test

jobs:
  install-cluster:
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    name: Conformance test on ${{ matrix.os_image }}
    runs-on:
      group: Default
    timeout-minutes: 600
    strategy:
      fail-fast: false
      matrix:
        os_image:
        - ubuntu-24.04
        - ubuntu-26.04
        - centos9
        - centos10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Spin up test environment
        run: ./spin-up-test-environment.sh --os-image ${{ matrix.os_image }}
        env:
          GITHUB_RUN_NUMBER: conf-${{ github.run_number }}
          TF_VAR_control_plane_memory_size: 8
          TF_VAR_worker_memory_size: 8


      - name: Install Kubernetes cluster
        run: ./install.sh -v ${{ env.KUBERNETES_VERSION }}

      - name: Verify cluster health
        run: ./verify-cluster-health.sh ${{ env.KUBERNETES_VERSION }}

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - name: Run conformance tests
        run: ./run-conformance-tests.sh

      - name: Collect logs on failure
        if: failure()
        run: ./collect-logs.sh

      - name: Upload logs artifact
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: logs-install-${{ matrix.os_image }}-${{ github.run_number }}
          path: /tmp/logs/${{ github.run_number }}/
          retention-days: 7

      - name: Upload conformance results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: conformance-${{ matrix.os_image }}-${{ github.run_number }}
          path: /tmp/results/
          retention-days: 7

      - name: Cleanup test environment
        if: always()
        run: ./shutdown-test-environment.sh || true
