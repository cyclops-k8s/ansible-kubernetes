- name: Configure the proxies
  any_errors_fatal: true
  become: true
  hosts: proxies
  vars:
    skip_checks: true
  roles:
  - role: kubernetes-defaults
  - role: kubernetes-proxy

- name: "Install containerd.io"
  any_errors_fatal: true
  become: true
  gather_facts: true
  hosts:
  - kubernetes
  serial: 100
  roles:
  - role: kubernetes-defaults
  - role: container-runtime

- name: Install kubernetes pre-requisites
  any_errors_fatal: true
  become: true
  hosts:
  - kubernetes
  serial: 100
  roles:
  - role: kubernetes-defaults
  - role: kubernetes

- name: Pre control plane hooks
  any_errors_fatal: true
  become: true
  hosts: control_planes
  roles:
  - role: kubernetes-defaults
  - role: pre-kubernetes-control-plane

- name: Install Control Planes
  any_errors_fatal: true
  become: true
  hosts: control_planes
  serial: 1
  roles:
  - role: kubernetes-defaults
  - role: kubernetes-control-plane

- name: Post control plane hooks
  any_errors_fatal: true
  become: true
  hosts: control_planes
  roles:
  - role: kubernetes-defaults
  - role: post-kubernetes-control-plane

- name: Install worker nodes
  any_errors_fatal: true
  become: true
  hosts: worker_nodes
  roles:
  - role: kubernetes-defaults
  - role: kubernetes-worker

- name: Post worker node hooks
  any_errors_fatal: true
  become: true
  hosts: worker_nodes
  roles:
  - role: kubernetes-defaults
  - role: post-kubernetes-worker

# The following plays are opt-in and only run against hosts placed in the `windows_worker_nodes`
# inventory group. If that group is empty or undefined, Ansible matches zero hosts and these
# plays are skipped entirely - existing Linux-only clusters are unaffected.
# Windows Server 2025 has no sudo, so `become` is not set (defaults to false) on these plays.
- name: Install Windows container runtime prerequisites
  any_errors_fatal: true
  gather_facts: true
  hosts: windows_worker_nodes
  roles:
  - role: kubernetes-defaults
  - role: container-runtime-windows

- name: Install Windows kubernetes pre-requisites
  any_errors_fatal: true
  hosts: windows_worker_nodes
  roles:
  - role: kubernetes-defaults
  - role: kubernetes-windows

- name: Install Windows worker nodes
  any_errors_fatal: true
  hosts: windows_worker_nodes
  roles:
  - role: kubernetes-defaults
  - role: kubernetes-worker-windows

- name: Post Windows worker node hooks
  any_errors_fatal: true
  hosts: windows_worker_nodes
  roles:
  - role: kubernetes-defaults
  tasks:
  - name: Post Windows workers hooks
    when:
    - kubernetes_hookfiles.post_windows_workers is defined
    with_items: "{{ kubernetes_hookfiles.post_windows_workers }}"
    ansible.builtin.include_tasks: "{{ item }}"

- name: Post Cluster Finalization
  any_errors_fatal: true
  become: true
  hosts: kubernetes
  roles:
  - role: kubernetes-defaults
  - role: post-kubernetes-finalization
